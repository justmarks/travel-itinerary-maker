# Dependabot config — keeps npm + GitHub Actions deps current.
#
# Strategy: weekly group PRs (rather than one PR per package) so the
# repo doesn't drown in churn. Security updates ship as their own
# PRs immediately regardless of the schedule.
#
# Dev-only dependencies (jest, eslint, typescript, etc.) batch
# together and don't gate the production-deps PR on a flaky
# typescript bump.

version: 2
updates:
  # ── Root workspace ──
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]
    labels: [dependencies]

  # ── apps/web ──
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
        # Keep React + Next.js majors out of the auto-batched group
        # — they tend to be coordinated upgrades that need manual
        # validation against the rest of the bundle.
        exclude-patterns:
          - "react"
          - "react-dom"
          - "next"
      development:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      # Suppress ESLint major-version bumps until eslint-config-next
      # supports them. ESLint 10 ships an internals change that breaks
      # `@rushstack/eslint-patch` (the runtime patcher
      # `eslint-config-next` uses) — see vercel/next.js#89764 and the
      # in-flight fix at vercel/next.js#90068. Lift this rule once
      # those merge into a Next.js release that bumps
      # `eslint-config-next`'s peer range.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    labels: [dependencies, web]

  # ── server ──
  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
        update-types: [minor, patch]
      development:
        dependency-type: development
        update-types: [minor, patch]
    labels: [dependencies, server]

  # ── packages/shared ──
  - package-ecosystem: npm
    directory: /packages/shared
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      all:
        update-types: [minor, patch]
    labels: [dependencies, shared]

  # ── packages/api-client ──
  - package-ecosystem: npm
    directory: /packages/api-client
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      all:
        update-types: [minor, patch]
    labels: [dependencies, api-client]

  # ── GitHub Actions versions ──
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, ci]
