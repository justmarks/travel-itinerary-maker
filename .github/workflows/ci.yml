name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Silence DEP0040 from transitive uri-js (ajv@6 via ESLint). require('punycode')
# resolves to Node's deprecated built-in regardless of any node_modules entry,
# so the only way to quiet it is at the Node process level.
env:
  NODE_OPTIONS: --disable-warning=DEP0040

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @travel-app/shared build

      - name: Run tests
        run: pnpm turbo run test

      - name: Type check
        run: pnpm turbo run build
