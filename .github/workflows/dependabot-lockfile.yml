name: Refresh pnpm-lock on Dependabot PRs

# Why this workflow exists:
# Dependabot's pnpm-workspace support is partial. When it bumps a dep
# inside a sub-package (e.g. `server/package.json`) it commits the
# package.json change but skips regenerating the root
# `pnpm-lock.yaml`. CI runs `pnpm install --frozen-lockfile`, sees the
# mismatch, and Vercel's preview build rejects the PR — even though
# the underlying bump is benign.
#
# This workflow runs on every Dependabot PR, re-runs `pnpm install`
# (lockfile-only mode, with `--ignore-scripts` for safety), and
# commits the refreshed lockfile back to the PR branch. After this
# pushes, the regular `CI` workflow runs again and Vercel passes.
#
# Security note: we use `pull_request_target` so the workflow has
# write access to the PR branch. To keep that safe with a fork or
# untrusted PR, we never execute any package scripts from the PR
# (`--ignore-scripts`) and don't run lint / test / build here. We
# only resolve the dep tree and write the lockfile.

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  refresh:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          # Check out the PR's branch, not the base. The default
          # `pull_request_target` checkout would land on `main`,
          # which is useless for amending the PR.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Refresh pnpm-lock.yaml
        # `--lockfile-only` resolves the tree and updates the lockfile
        # without writing `node_modules`, which is everything we need
        # for the lockfile-mismatch fix and avoids running install
        # scripts that the PR could have authored. `--ignore-scripts`
        # is belt-and-suspenders.
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Commit and push lockfile if changed
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "Lockfile already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh pnpm-lock for Dependabot update [skip ci]"
          git push
