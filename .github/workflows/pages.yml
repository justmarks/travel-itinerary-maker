name: Deploy to GitHub Pages

# Publishes the production build to the `gh-pages` branch root. PR previews
# (see pr-preview.yml) push to `gh-pages:/previews/pr-NN/`, so this workflow
# uses `keep_files: true` to avoid wiping live preview directories during a
# main deploy.
#
# One-time setup: in repo Settings → Pages, set Source = "Deploy from a
# branch", Branch = `gh-pages`, Folder = `/ (root)`. See docs/pr-previews.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

# Silence DEP0040 from transitive uri-js (ajv@6 via ESLint and various build
# tools). require('punycode') resolves to Node's deprecated built-in regardless
# of any node_modules entry, so the only way to quiet it is at the Node process
# level.
env:
  NODE_OPTIONS: --disable-warning=DEP0040
  # peaceiris/actions-gh-pages@v4 still declares `using: node20` and has no
  # Node 24 release yet. Opt the runner into Node 24 for any node20 actions
  # so we're not riding the deprecation warning until a v5 lands.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @travel-app/shared build
          pnpm --filter @travel-app/api-client build

      - name: Build web app
        # NEXT_PUBLIC_* vars are inlined into the static bundle at build time,
        # so each one the client reads has to be wired through here even if
        # it already exists as a repository secret.
        run: pnpm --filter web build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_BASE_PATH: /travel-itinerary-maker
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          publish_branch: gh-pages
          # Keep the previews/ subtree intact when the main site redeploys.
          # Trade-off: deleted main-build files won't be cleaned up. Acceptable
          # because Next exports tend to be additive, and any cruft lives at
          # paths nobody links to.
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: main → gh-pages (${{ github.sha }})"
