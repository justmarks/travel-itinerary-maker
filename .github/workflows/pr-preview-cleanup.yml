name: PR Preview Cleanup

# Removes a PR's preview directory from the gh-pages branch when the PR is
# closed (merged or otherwise). The matching comment is left in place so
# the merged PR keeps a record of what was previewed.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

# Silence DEP0040 from transitive uri-js in actions/github-script's octokit
# deps. require('punycode') resolves to Node's deprecated built-in regardless
# of any node_modules entry, so the only way to quiet it is at the Node process
# level.
env:
  NODE_OPTIONS: --disable-warning=DEP0040

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PREVIEW_PATH: previews/pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          # Default token has contents:write via the workflow permissions.
          # No need for a PAT.
          fetch-depth: 1

      - name: Remove preview directory and push
        run: |
          set -euo pipefail
          if [ ! -d "$PREVIEW_PATH" ]; then
            echo "No preview directory at $PREVIEW_PATH; nothing to clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf "$PREVIEW_PATH"
          git commit -m "preview: remove PR #$PR_NUMBER ($PREVIEW_PATH)"
          git push origin gh-pages

      - name: Update PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (!existing) return;
            const body = [
              marker,
              '### 📱 Preview removed',
              '',
              context.payload.pull_request.merged
                ? '_PR merged — preview directory cleaned up. The merged build is live at the main site._'
                : '_PR closed — preview directory cleaned up._',
            ].join('\n');
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
