name: PR Preview Deploy

# Builds the web app for every PR and publishes it to a per-PR subdirectory
# of the gh-pages branch. Each preview lives at:
#
#   https://<user>.github.io/travel-itinerary-maker/previews/pr-<number>/
#
# A bot comment on the PR points at the URL. Use `?demo=true` to test
# without a real backend (the preview deploy doesn't have OAuth-redirect
# URIs registered, so demo mode is the smoothest path).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One in-flight preview per PR. New pushes cancel earlier builds.
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Silence DEP0040 from transitive uri-js (ajv@6 via ESLint, octokit deps in
# actions/github-script, etc.). require('punycode') resolves to Node's
# deprecated built-in regardless of any node_modules entry, so the only way to
# quiet it is at the Node process level.
env:
  NODE_OPTIONS: --disable-warning=DEP0040
  # peaceiris/actions-gh-pages@v4 still declares `using: node20` and has no
  # Node 24 release yet. Opt the runner into Node 24 for any node20 actions
  # so we're not riding the deprecation warning until a v5 lands.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy-preview:
    # Skip drafts and PRs from forks (forks can't access secrets and the
    # gh-pages push needs `contents: write`, which forks don't get).
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PREVIEW_PATH: previews/pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @travel-app/shared build
          pnpm --filter @travel-app/api-client build

      - name: Build web app for preview path
        run: pnpm --filter web build
        env:
          NODE_ENV: production
          # All asset URLs and the SPA 404 shim use this. Must match the
          # destination_dir below so the preview is fully self-contained.
          NEXT_PUBLIC_BASE_PATH: /travel-itinerary-maker/${{ env.PREVIEW_PATH }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Publish to gh-pages preview directory
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          publish_branch: gh-pages
          destination_dir: ${{ env.PREVIEW_PATH }}
          # Don't touch other previews or the main site when this PR pushes.
          keep_files: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "preview: PR #${{ env.PR_NUMBER }} → ${{ env.PREVIEW_PATH }}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: https://${{ github.repository_owner }}.github.io/travel-itinerary-maker/previews/pr-${{ env.PR_NUMBER }}/
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const marker = '<!-- pr-preview-comment -->';
            const body = [
              marker,
              '### 📱 Preview deployed',
              '',
              `**[Open preview →](${previewUrl})**`,
              '',
              `- Demo (no auth): [${previewUrl}?demo=true](${previewUrl}?demo=true)`,
              `- Mobile demo: [${previewUrl}m/?demo=true](${previewUrl}m/?demo=true)`,
              '',
              `_Built from ${context.payload.pull_request.head.sha.slice(0, 7)}. Updated automatically on each push._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
