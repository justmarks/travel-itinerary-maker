name: Version Bump

on:
  push:
    branches: [main]
    paths-ignore:
      - "package.json"
      - "apps/web/package.json"
      - "CHANGELOG.md"

jobs:
  bump:
    runs-on: ubuntu-latest
    # Don't run on version bump commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node and npm are pre-installed on ubuntu-latest — no setup needed.
      # This workflow only runs `npm version` + git; avoid pnpm/setup-node to
      # sidestep their post-run cache validation failures.

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump type
        id: bump-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)(\(.*\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE "^(feat|feature)"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      # apps/web/package.json carries the version surfaced in the UI
      # (UserMenu dropdown). Mirror the root bump into apps/web only when
      # this push touched apps/web — that way server-only commits don't
      # change the visible web version.
      - name: Detect apps/web changes
        id: web-changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/web/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        run: |
          npm version ${{ steps.bump-type.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json

          if [ "${{ steps.web-changed.outputs.changed }}" = "true" ]; then
            (cd apps/web && npm version "$VERSION" --no-git-tag-version --allow-same-version)
            git add apps/web/package.json
          fi

          git commit -m "chore: bump version to $VERSION [skip ci]"
          git tag "v$VERSION"
          git push && git push --tags
