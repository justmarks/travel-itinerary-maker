<!--
  Monochrome notification "badge" for the Web Push API.

  Android extracts the alpha channel from this image and tints it
  with the system accent (typically white) for the small icon shown
  in the status bar next to the clock. Anything fully opaque is
  drawn; transparent pixels are dropped.

  Design (Direction 16): plane silhouette + dashed contrail + pin —
  mirrors the brand mark's "flight to destination" story but
  simplified to read at status-bar size (~24 px). The map / parchment
  is omitted because a chunky white silhouette of it muddles the read
  at small sizes; the plane + pin carry the brand identity on their
  own.

  The colour value is `#ffffff` for clarity but Android ignores
  RGB and uses only alpha — any non-transparent fill renders
  identically at the OS level.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="itinly notification badge">
  <!-- Dashed flight contrail -->
  <path d="M 6 14 Q 22 10 38 32" stroke="#ffffff" stroke-width="3" fill="none" stroke-dasharray="3.5 2.5" stroke-linecap="round"/>
  <!-- Plane silhouette (banked, top-down) -->
  <g transform="translate(8 14) rotate(125) scale(0.95)">
    <path d="M 0 -14 L 2 -2 L 14 2 L 14 4 L 2 3 L 2 8 L 6 12 L 6 14 L 0 13 L -6 14 L -6 12 L -2 8 L -2 3 L -14 4 L -14 2 L -2 -2 Z" fill="#ffffff"/>
  </g>
  <!-- Destination pin -->
  <path d="M 44 32 C 40 32 38 35 38 39 C 38 44 44 52 44 52 C 44 52 50 44 50 39 C 50 35 48 32 44 32 Z" fill="#ffffff"/>
</svg>
