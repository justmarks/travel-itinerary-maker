<!--
  Monochrome notification "badge" for the Web Push API.

  Android extracts the alpha channel from this image and tints it
  with the system accent (typically white) for the small icon shown
  in the status bar next to the clock. Anything fully opaque is
  drawn; transparent pixels are dropped.

  Why this file exists separately from `icon.svg`: that one fills the
  whole 64×64 canvas with a dark zinc background, so Android sees a
  solid-opaque rectangle in the alpha channel and renders it as a
  white square. This file keeps only the brand silhouette (pin head
  + i-stem) opaque, on a transparent background.

  The colour value below is `#ffffff` for clarity but Android ignores
  RGB and uses only alpha — any non-transparent fill would render
  identically at the OS level.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="itinly notification badge">
  <path d="M 32 8 C 27 8 23 12 23 17 C 23 22.5 32 30 32 30 C 32 30 41 22.5 41 17 C 41 12 37 8 32 8 Z" fill="#ffffff"/>
  <rect x="29" y="36" width="6" height="22" rx="2" fill="#ffffff"/>
</svg>
