<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Travel Itinerary Maker</title>
    <script>
      // GitHub Pages serves this page for any path that doesn't map to a
      // pre-built static file. Our app only has static routes now, so the
      // only 404s we expect are old bookmarks for dynamic routes from
      // before the query-param refactor. Map those to the new URLs.
      (function () {
        var basePath = "/travel-itinerary-maker";
        var l = window.location;
        var path = l.pathname;
        if (path.indexOf(basePath) === 0) path = path.slice(basePath.length);

        // Strip trailing slash for matching.
        if (path.length > 1 && path.charAt(path.length - 1) === "/") {
          path = path.slice(0, -1);
        }

        var target = basePath + "/";
        var tripMatch = path.match(/^\/trips\/([^\/]+)$/);
        var sharedMatch = path.match(/^\/shared\/([^\/]+)$/);
        if (tripMatch) {
          target = basePath + "/trips/?id=" + encodeURIComponent(tripMatch[1]);
        } else if (sharedMatch) {
          target =
            basePath + "/shared/?token=" + encodeURIComponent(sharedMatch[1]);
        }

        // Preserve any query string from the original request (e.g. ?demo=true).
        if (l.search) {
          target += (target.indexOf("?") >= 0 ? "&" : "?") + l.search.slice(1);
        }
        l.replace(target + l.hash);
      })();
    </script>
  </head>
  <body></body>
</html>
